name: Project control verification

on:
  pull_request:
    branches: [master]
    paths:
      - '.github/workflows/project-control-verify.yml'
      - 'docs/hermes-project-control-brief.md'
      - 'package.json'
      - 'project-control/**'
      - 'scripts/project_control.py'
      - 'tests/test_project_control.py'
  push:
    branches:
      - master
      - feat/automatic-project-control-brief
    paths:
      - '.github/workflows/project-control-verify.yml'
      - 'docs/hermes-project-control-brief.md'
      - 'package.json'
      - 'project-control/**'
      - 'scripts/project_control.py'
      - 'tests/test_project_control.py'

permissions:
  contents: read

concurrency:
  group: project-control-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source without write credentials
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install schema validator
        run: python -m pip install jsonschema

      - name: Verify generated control brief
        run: npm run --silent control:verify

      - name: Run focused integrity tests
        run: npm run --silent control:test

      - name: Validate Draft 2020-12 schema and state
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          from jsonschema import Draft202012Validator

          schema = json.loads(
              Path('project-control/project-control.schema.json').read_text(encoding='utf-8')
          )
          state = json.loads(
              Path('project-control/project-control.json').read_text(encoding='utf-8')
          )
          Draft202012Validator.check_schema(schema)
          Draft202012Validator(
              schema,
              format_checker=Draft202012Validator.FORMAT_CHECKER,
          ).validate(state)
          print('JSON Schema Draft 2020-12 validation: passed')
          PY
